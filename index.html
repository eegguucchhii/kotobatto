<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ことばっと！ - KOTOBATTO</title>
    <style>
        :root {
            /* 鮮やかで深いブルーを背景に */
            --bg-color: #0c6cc1;
            --main-text: #ffffff;
            --sub-text: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            background-color: var(--bg-color);
            font-family: "Avenir Next", "Helvetica Neue", Arial, "Hiragino Sans", sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* ロゴは黒で引き締める */
        .title-logo {
            position: absolute;
            top: 25px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 0.3rem;
            color: var(--sub-text);
        }

        /* 右下のクレジットも黒で配置 */
        .credit {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--sub-text);
            letter-spacing: 0.1rem;
            text-transform: uppercase;
        }

        .main-display {
            text-align: center;
            pointer-events: none;
        }

        /* メインのひらがなは白 */
        .char {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px;
            color: var(--main-text);
            /* ネオン演出（text-shadow）を削除 */
        }

        /* ルール説明は黒 */
        .rule {
            font-size: 2rem;
            font-weight: 900;
            color: var(--sub-text);
            letter-spacing: -0.05rem;
        }

        /* 文字数は白にして強調 */
        .length-num {
            color: var(--main-text);
            font-size: 4rem;
            margin: 0 5px;
        }

        .footer-hint {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(0, 0, 0, 0.4);
            font-weight: bold;
            letter-spacing: 0.2rem;
        }

        /* ポップな出現アニメーション */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate {
            animation: pop 0.1s ease-out;
        }
    </style>
</head>
<body onclick="generate()">

    <div class="game-wrapper">
        <div class="title-logo">KOTOBATTO</div>

        <div class="main-display" id="displayArea">
            <div id="char" class="char">？</div>
            <div class="rule">
                からはじまる <span id="length" class="length-num">?</span>文字
            </div>
        </div>

        <div class="footer-hint">TAP TO START</div>
        <div class="credit">by EGUCHI</div>
    </div>

    <script>
        const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわ".split("");

        function generate() {
            const charEl = document.getElementById('char');
            const lengthEl = document.getElementById('length');
            const area = document.getElementById('displayArea');

            const randomChar = chars[Math.floor(Math.random() * chars.length)];
            const randomLength = Math.floor(Math.random() * 5) + 2;

            charEl.textContent = randomChar;
            lengthEl.textContent = randomLength;

            area.classList.remove('animate');
            void area.offsetWidth;
            area.classList.add('animate');
            
            if (window.navigator.vibrate) {
                window.navigator.vibrate(12);
            }
        }

        window.onload = generate;
    </script>
</body>
</html>
